<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bangladesh Weather App 🌦️</title>
  <link rel="icon" type="image/png" href="Files/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="card">

    <!-- Website Title-->
    <h2 class="website-title">Bangladesh Weather</h2>

    <!-- TIME -->
    <div class="time-box">
      <div id="time" class="time">00:00</div>
      <div id="date" class="date"></div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <input type="text" id="cityInput" placeholder="Search district..." autocomplete="off">
      <div id="suggestions" class="autocomplete-suggestions" style="display:none;"></div>
    </div>

    <!-- WEATHER -->
    <div id="weather"></div>

    <!-- FOOTER -->
    <div class="footer">
      <span>Developed by <strong>Md. Ridwan Rahman Radhi</strong></span><br>
      <span>Team: <b>RRR</b></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
